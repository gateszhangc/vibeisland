name: Build And Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: vibeisland-release
  cancel-in-progress: true

jobs:
  build-and-release:
    if: github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    env:
      APP_NAME: vibeisland
      APP_NAMESPACE: vibeisland
      APP_REPO_URL: https://github.com/gateszhangc/vibeisland.git
      APP_BRANCH: main
      BUILD_JOB_NAMESPACE: dokploy-fleet-build
      BUILD_JOB_SECRET: fleet-registry-push
      IMAGE_REPOSITORY: registry.144.91.77.245.sslip.io/vibeisland
      KUSTOMIZATION_PATH: deploy/k8s/overlays/prod/kustomization.yaml
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure kubectl
        env:
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG_B64 }}
        run: |
          test -n "$KUBECONFIG_B64"
          mkdir -p "$HOME/.kube"
          echo "$KUBECONFIG_B64" | base64 --decode > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"
          kubectl version --client
          kubectl cluster-info

      - name: Derive build metadata
        id: meta
        run: |
          short_sha="${GITHUB_SHA::12}"
          echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "build_job_name=${APP_NAME}-build-${short_sha}" >> "$GITHUB_OUTPUT"
          echo "git_context=git://github.com/${GITHUB_REPOSITORY}.git#refs/heads/${GITHUB_REF_NAME}#${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Run K8s build job
        env:
          BUILD_JOB_NAME: ${{ steps.meta.outputs.build_job_name }}
          BUILD_CONTEXT: ${{ steps.meta.outputs.git_context }}
          BUILD_IMAGE: ${{ env.IMAGE_REPOSITORY }}:${{ steps.meta.outputs.image_tag }}
          BUILD_JOB_NAMESPACE: ${{ env.BUILD_JOB_NAMESPACE }}
          BUILD_JOB_SECRET: ${{ env.BUILD_JOB_SECRET }}
        run: |
          kubectl delete job -n "$BUILD_JOB_NAMESPACE" "$BUILD_JOB_NAME" --ignore-not-found=true
          ./scripts/render_kaniko_build_job.sh > /tmp/kaniko-job.yaml
          kubectl apply -f /tmp/kaniko-job.yaml
          kubectl wait -n "$BUILD_JOB_NAMESPACE" --for=condition=complete "job/$BUILD_JOB_NAME" --timeout=30m
          kubectl logs -n "$BUILD_JOB_NAMESPACE" "job/$BUILD_JOB_NAME" --tail=-1 || true

      - name: Update production image tag
        env:
          IMAGE_TAG: ${{ steps.meta.outputs.image_tag }}
          KUSTOMIZATION_PATH: ${{ env.KUSTOMIZATION_PATH }}
        run: |
          python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          path = Path(os.environ["KUSTOMIZATION_PATH"])
          content = path.read_text()
          updated, count = re.subn(
              r"(^\s*newTag:\s*).*$",
              rf"\1{os.environ['IMAGE_TAG']}",
              content,
              count=1,
              flags=re.MULTILINE,
          )
          if count != 1:
              raise SystemExit("expected exactly one newTag entry in production kustomization")
          path.write_text(updated)
          PY

      - name: Commit release manifest update
        env:
          IMAGE_TAG: ${{ steps.meta.outputs.image_tag }}
          KUSTOMIZATION_PATH: ${{ env.KUSTOMIZATION_PATH }}
        run: |
          if git diff --quiet -- "$KUSTOMIZATION_PATH"; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$KUSTOMIZATION_PATH"
          git commit -m "chore: release ${IMAGE_TAG} [skip ci]"
          git push origin HEAD:${APP_BRANCH}

      - name: Apply Argo CD project and application
        run: |
          kubectl apply -f deploy/argocd/project.yaml
          kubectl apply -f deploy/argocd/application.yaml

      - name: Wait for Argo CD sync
        env:
          APP_NAME: ${{ env.APP_NAME }}
        run: |
          for attempt in $(seq 1 60); do
            sync_status="$(kubectl -n argocd get application "$APP_NAME" -o jsonpath='{.status.sync.status}' 2>/dev/null || true)"
            health_status="$(kubectl -n argocd get application "$APP_NAME" -o jsonpath='{.status.health.status}' 2>/dev/null || true)"
            if [ "$sync_status" = "Synced" ] && [ "$health_status" = "Healthy" ]; then
              echo "Application is synced and healthy."
              exit 0
            fi
            sleep 10
          done
          kubectl -n argocd get application "$APP_NAME" -o yaml
          exit 1
