apiVersion: apps/v1
kind: Deployment
metadata:
  name: vibeisland
  labels:
    app.kubernetes.io/name: vibeisland
    app.kubernetes.io/part-of: vibeisland
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: vibeisland
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vibeisland
        app.kubernetes.io/part-of: vibeisland
    spec:
      imagePullSecrets:
        - name: dokploy-fleet-ghcr
      containers:
        - name: vibeisland
          image: registry.144.91.77.245.sslip.io/vibeisland:bootstrap
          imagePullPolicy: IfNotPresent
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: HOSTNAME
              value: 0.0.0.0
          ports:
            - name: http
              containerPort: 3000
          readinessProbe:
            initialDelaySeconds: 10
            periodSeconds: 10
            tcpSocket:
              port: 3000
          livenessProbe:
            initialDelaySeconds: 20
            periodSeconds: 20
            tcpSocket:
              port: 3000
          startupProbe:
            failureThreshold: 30
            periodSeconds: 5
            tcpSocket:
              port: 3000
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
