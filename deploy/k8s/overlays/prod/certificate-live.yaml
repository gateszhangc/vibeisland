apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: vibeisland-live-tls
spec:
  secretName: vibeisland-live-tls
  privateKey:
    rotationPolicy: Always
  issuerRef:
    group: cert-manager.io
    kind: Issuer
    name: letsencrypt-prod-cloudflare
  dnsNames:
    - vibeisland.lol
    - www.vibeisland.lol
  usages:
    - digital signature
    - key encipherment
