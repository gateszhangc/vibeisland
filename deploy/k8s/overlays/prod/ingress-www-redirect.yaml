apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vibeisland-www
  annotations:
    acme.cert-manager.io/http01-edit-in-place: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
    cert-manager.io/issue-temporary-certificate: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/permanent-redirect: https://vibeisland.lol$request_uri
spec:
  ingressClassName: nginx
  tls:
    - secretName: vibeisland-www-tls
      hosts:
        - www.vibeisland.lol
  rules:
    - host: www.vibeisland.lol
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vibeisland
                port:
                  number: 80
