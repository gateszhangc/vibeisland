apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: vibeisland-staging-tls
spec:
  secretName: vibeisland-staging-tls
  privateKey:
    rotationPolicy: Always
  issuerRef:
    group: cert-manager.io
    kind: Issuer
    name: letsencrypt-staging-cloudflare
  dnsNames:
    - staging.vibeisland.lol
  usages:
    - digital signature
    - key encipherment
