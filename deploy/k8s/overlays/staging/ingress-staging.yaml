apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vibeisland-staging
  annotations:
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - secretName: vibeisland-staging-tls
      hosts:
        - staging.vibeisland.lol
  rules:
    - host: staging.vibeisland.lol
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vibeisland
                port:
                  number: 80
